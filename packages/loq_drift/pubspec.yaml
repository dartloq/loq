name: loq_drift
description: >-
  Structured query logging interceptor for Drift, powered by loq. Logs SQL
  statements, durations, row counts, batches, and transactions as structured
  records aligned with OpenTelemetry database semantic conventions.
version: 0.1.0
homepage: https://github.com/dartloq/loq
repository: https://github.com/dartloq/loq/tree/main/packages/loq_drift
issue_tracker: https://github.com/dartloq/loq/issues
topics:
  - logging
  - drift
  - sqlite
  - structured-logging

environment:
  sdk: ^3.5.0

resolution: workspace

dependencies:
  drift: ^2.28.2
  loq: ^0.1.1

dev_dependencies:
  drift_postgres: ^1.3.1
  postgres: ^3.0.0
  test: ^1.31.0
  very_good_analysis: ^10.2.0
