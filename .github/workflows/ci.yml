name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1.7.2
        with:
          sdk: stable

      - name: Install melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: |
          dart pub get
          melos bootstrap

      - name: Check formatting
        run: melos run format

      - name: Analyze
        run: melos run analyze

  # Default test job for packages that don't need external services.
  # Packages with special requirements (system libraries, service
  # containers, Flutter SDK, etc.) get their own job below. They
  # install their extras first, then invoke the same composite action
  # via `uses: ./.github/actions/test-package`.
  test:
    name: Test (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [loq, loq_shelf]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/test-package
        with:
          package: ${{ matrix.package }}
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

  # loq_drift needs libsqlite3 for the default test run (sqlite is
  # preinstalled on ubuntu-latest; the explicit apt-get is
  # belt-and-suspenders) and a postgres service container for the
  # tagged postgres smoke tests. Kept in its own job so the postgres
  # container doesn't spin up on every matrix leg.
  test-drift:
    name: Test (loq_drift)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Install libsqlite3
        run: sudo apt-get install -y libsqlite3-0

      - uses: ./.github/actions/test-package
        with:
          package: loq_drift
          codecov-token: ${{ secrets.CODECOV_TOKEN }}

      # Postgres integration tests are tagged and skipped by default
      # (see packages/loq_drift/dart_test.yaml). `--run-skipped`
      # overrides the skip marker. Coverage is not captured here:
      # postgres tests hit the same lib/src/ paths the default run
      # already covers, so the extra coverage from this step is ~0.
      - name: Run postgres integration tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        run: |
          cd packages/loq_drift
          dart test --tags postgres --run-skipped

  # loq_flutter lives in the workspace alongside the pure-Dart
  # packages, but needs the Flutter SDK to resolve and test. It gets
  # its own job that sets up Flutter and runs `flutter test --coverage`
  # (which writes lcov directly — no format_coverage step needed).
  test-flutter:
    name: Test (loq_flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: |
          cd packages/loq_flutter
          flutter pub get

      - name: Analyze
        run: |
          cd packages/loq_flutter
          flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: |
          cd packages/loq_flutter
          flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: packages/loq_flutter/coverage/lcov.info
          flags: loq_flutter
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
