name: 'Test loq package'
description: >-
  Bootstraps the melos workspace, runs `dart test --coverage` for one
  package, formats the result as LCOV, and uploads to Codecov tagged
  with the package's name. Used by every per-package test job in
  ci.yml so the standard test flow lives in one place.

  Installs the Flutter SDK because the workspace contains a Flutter
  package (loq_flutter); `flutter pub get` is the only resolver that
  can handle a mixed Dart + Flutter workspace. Dart-only packages
  still run their tests via `dart test` (the Dart binary ships with
  Flutter).

  Callers must `actions/checkout` first (the composite's action.yml
  lives in the repo). Callers with extra system requirements
  (libsqlite3, a postgres service, etc.) install / start those
  before invoking this action; `dart test` runs inside this action.

inputs:
  package:
    description: 'Package directory name under packages/ (e.g. loq_drift).'
    required: true
  codecov-token:
    description: >-
      Codecov upload token. Pass the CODECOV_TOKEN repository secret
      from the calling workflow.
    required: true

runs:
  using: 'composite'
  steps:
    - uses: subosito/flutter-action@v2
      with:
        channel: stable
        cache: true
        pub-cache: true

    - name: Install melos
      shell: bash
      run: dart pub global activate melos

    - name: Bootstrap
      shell: bash
      run: |
        flutter pub get
        melos bootstrap

    - name: Run tests with coverage
      shell: bash
      run: |
        cd packages/${{ inputs.package }}
        dart pub global activate coverage
        dart test --coverage=coverage
        dart pub global run coverage:format_coverage \
          --lcov \
          --in=coverage \
          --out=coverage/lcov.info \
          --report-on=lib

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: packages/${{ inputs.package }}/coverage/lcov.info
        flags: ${{ inputs.package }}
        token: ${{ inputs.codecov-token }}
        fail_ci_if_error: false
